<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Bambu Lab A1 - poster</title>
  <desc id="desc">Poster pentru videoclipul demonstrativ al imprimantei 3D Bambu Lab A1.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="70" y="70" width="1140" height="580" rx="24" fill="#ffffff" stroke="#f25c05" stroke-width="6"/>
  <text x="640" y="285" text-anchor="middle" font-size="78" fill="#111827" font-family="Arial, sans-serif" font-weight="700">Bambu Lab A1</text>
  <text x="640" y="350" text-anchor="middle" font-size="34" fill="#374151" font-family="Arial, sans-serif">Video local cu subtitrari RO/EN</text>
  <text x="640" y="420" text-anchor="middle" font-size="24" fill="#6b7280" font-family="Arial, sans-serif">Imprimanta 3D - prezentare si demo</text>
</svg>